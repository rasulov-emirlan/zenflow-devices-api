services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: zenflow
      POSTGRES_PASSWORD: zenflow
      POSTGRES_DB: zenflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zenflow -d zenflow"]
      interval: 2s
      timeout: 3s
      retries: 20

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 8080
      DATABASE_URL: postgres://zenflow:zenflow@postgres:5432/zenflow?sslmode=disable
      LOG_LEVEL: info
      APP_ENV: dev
      MIGRATE_MODE: auto
      SEED_ON_BOOT: "true"
      BASIC_AUTH_USERS: "alice:$$2a$$10$$Y10WC4uCFi2qC5f/gts5s.5qYGjkRJM5It.MKhZvAevUnto6fyMgi"
      METRICS_ADDR: ":9090"
      OTLP_ENDPOINT: "otel-collector:4317"
      TRACING_ENABLED: "false"
      OTEL_SERVICE_NAME: "zenflow-devices-api"
    ports:
      - "8080:8080"
      - "9090:9090"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./deploy/otel/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      - tempo
    ports:
      - "4317:4317"

  tempo:
    image: grafana/tempo:2.6.1
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./deploy/tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"

  prometheus:
    image: prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=6h"
      - "--web.enable-lifecycle"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - api
    ports:
      - "9091:9090"

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_USERS_DEFAULT_THEME: "dark"
      GF_FEATURE_TOGGLES_ENABLE: "traceqlEditor"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - tempo
    ports:
      - "3000:3000"

volumes:
  tempo-data:
  prometheus-data:
  grafana-data:
