services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: zenflow
      POSTGRES_PASSWORD: zenflow
      POSTGRES_DB: zenflow
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zenflow -d zenflow"]
      interval: 2s
      timeout: 3s
      retries: 20

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 8080
      DATABASE_URL: postgres://zenflow:zenflow@postgres:5432/zenflow?sslmode=disable
      LOG_LEVEL: info
      BASIC_AUTH_USERS: "alice:$$2a$$10$$Q9m2r.Dh7j8lq3vFJHS2/eCLXWnZkGm/9Lqg8LeZVsWrA/VjKrqqS"
    ports:
      - "8080:8080"
